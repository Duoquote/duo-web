name: Publish new posts to Facebook

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new posts
        id: detect
        run: |
          # Find markdown files added in this push
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/posts/*.md' || true)

          if [ -z "$NEW_FILES" ]; then
            echo "No new posts found."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_new=true" >> "$GITHUB_OUTPUT"

          # Parse frontmatter from the first new post
          FILE=$(echo "$NEW_FILES" | head -n 1)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

          # Extract title and description from frontmatter
          TITLE=$(sed -n 's/^title: *"\(.*\)"/\1/p' "$FILE" | head -1)
          DESC=$(sed -n 's/^description: *"\(.*\)"/\1/p' "$FILE" | head -1)

          # Derive slug from filename (e.g. hello-world.md -> hello-world)
          SLUG=$(basename "$FILE" .md)
          POST_URL="https://dq.ms/posts/${SLUG}"

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "description=$DESC" >> "$GITHUB_OUTPUT"
          echo "url=$POST_URL" >> "$GITHUB_OUTPUT"

      - name: Publish to Facebook Page
        if: steps.detect.outputs.has_new == 'true'
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: |
          TITLE="${{ steps.detect.outputs.title }}"
          DESC="${{ steps.detect.outputs.description }}"
          URL="${{ steps.detect.outputs.url }}"

          MESSAGE="${TITLE}

          ${DESC}

          Read more: ${URL}"

          # Post a link share to the Facebook Page
          RESPONSE=$(curl -s -X POST \
            "https://graph.facebook.com/v21.0/${FB_PAGE_ID}/feed" \
            -F "message=${MESSAGE}" \
            -F "link=${URL}" \
            -F "access_token=${FB_ACCESS_TOKEN}")

          echo "Facebook API response: $RESPONSE"

          # Check for errors
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "::error::Facebook API returned an error"
            exit 1
          fi

          echo "Post published successfully!"
