name: Publish new posts to Facebook

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new posts
        id: detect
        run: |
          # Find markdown files added in this push
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/posts/*.md' || true)

          if [ -z "$NEW_FILES" ]; then
            echo "No new posts found."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_new=true" >> "$GITHUB_OUTPUT"

          # Parse frontmatter from the first new post
          FILE=$(echo "$NEW_FILES" | head -n 1)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

          # Extract title, description, image, and summary from frontmatter/body
          TITLE=$(sed -n 's/^title: *"\(.*\)"/\1/p' "$FILE" | head -1)
          DESC=$(sed -n 's/^description: *"\(.*\)"/\1/p' "$FILE" | head -1)
          IMAGE=$(sed -n 's/^image: *"\(.*\)"/\1/p' "$FILE" | head -1)

          # Extract summary: body content before <!-- more -->, stripping frontmatter and markdown syntax
          SUMMARY=$(awk '/^---$/{if(++c==2){f=1;next}}f{if(/<!-- more -->/){exit}print}' "$FILE" \
            | sed 's/^#\+ //; s/\*\*//g; s/\*//g; s/`//g; s/\[//g; s/\]//g; s/([^)]*)//g' \
            | tr '\n' ' ' | sed 's/  */ /g; s/^ //; s/ $//')

          # Derive slug from filename (e.g. hello-world.md -> hello-world)
          SLUG=$(basename "$FILE" .md)
          POST_URL="https://dq.ms/posts/${SLUG}"

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "description=$DESC" >> "$GITHUB_OUTPUT"
          echo "url=$POST_URL" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Publish to Facebook Page
        if: steps.detect.outputs.has_new == 'true'
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: |
          TITLE="${{ steps.detect.outputs.title }}"
          SUMMARY="${{ steps.detect.outputs.summary }}"
          DESC="${{ steps.detect.outputs.description }}"
          URL="${{ steps.detect.outputs.url }}"

          IMAGE="${{ steps.detect.outputs.image }}"

          # Use summary (body before <!-- more -->) if available, otherwise fall back to description
          BODY="${SUMMARY:-$DESC}"

          MESSAGE="${TITLE}

          ${BODY}

          Read more: ${URL}"

          if [ -n "$IMAGE" ]; then
            # Upload as a photo post with the image embedded
            IMAGE_URL="https://dq.ms${IMAGE}"
            RESPONSE=$(curl -s -X POST \
              "https://graph.facebook.com/v21.0/${FB_PAGE_ID}/photos" \
              -F "url=${IMAGE_URL}" \
              -F "message=${MESSAGE}" \
              -F "access_token=${FB_ACCESS_TOKEN}")
          else
            # Text-only post with link
            RESPONSE=$(curl -s -X POST \
              "https://graph.facebook.com/v21.0/${FB_PAGE_ID}/feed" \
              -F "message=${MESSAGE}" \
              -F "access_token=${FB_ACCESS_TOKEN}")
          fi

          echo "Facebook API response: $RESPONSE"

          # Check for errors
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "::error::Facebook API returned an error"
            exit 1
          fi

          echo "Post published successfully!"
