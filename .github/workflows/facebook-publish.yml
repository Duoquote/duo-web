name: Publish new posts to Facebook

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install remove-markdown
        run: npm install remove-markdown

      - name: Detect and prepare post
        id: detect
        run: |
          # Find markdown files added in this push
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/posts/*.md' || true)

          if [ -z "$NEW_FILES" ]; then
            echo "No new posts found."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_new=true" >> "$GITHUB_OUTPUT"

          FILE=$(echo "$NEW_FILES" | head -n 1)
          SLUG=$(basename "$FILE" .md)

          # Use Node to extract frontmatter fields and convert summary to plain text
          node -e "
            const fs = require('fs');
            const removeMd = require('remove-markdown');

            const raw = fs.readFileSync('$FILE', 'utf-8');

            // Split frontmatter and body
            const parts = raw.split('---');
            const frontmatter = parts[1] || '';
            const body = parts.slice(2).join('---').trim();

            // Parse frontmatter fields
            const field = (key) => {
              const m = frontmatter.match(new RegExp('^' + key + ':\\s*\"(.*)\"', 'm'));
              return m ? m[1] : '';
            };

            const title = field('title');
            const desc = field('description');
            const image = field('image');

            // Extract summary (before <!-- more -->)
            const moreSplit = body.split('<!-- more -->');
            const summaryMd = moreSplit[0].trim();

            // Convert markdown to clean plain text
            const summary = summaryMd ? removeMd(summaryMd, { gfm: true }).trim() : '';

            // Write to temp files (avoids all shell escaping issues)
            fs.writeFileSync('/tmp/fb_title.txt', title);
            fs.writeFileSync('/tmp/fb_desc.txt', desc);
            fs.writeFileSync('/tmp/fb_image.txt', image);
            fs.writeFileSync('/tmp/fb_summary.txt', summary);
            fs.writeFileSync('/tmp/fb_url.txt', 'https://dq.ms/posts/$SLUG');
          "

          echo "image=$(cat /tmp/fb_image.txt)" >> "$GITHUB_OUTPUT"
          echo "url=$(cat /tmp/fb_url.txt)" >> "$GITHUB_OUTPUT"

      - name: Publish to Facebook Page
        if: steps.detect.outputs.has_new == 'true'
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: |
          TITLE=$(cat /tmp/fb_title.txt)
          SUMMARY=$(cat /tmp/fb_summary.txt)
          DESC=$(cat /tmp/fb_desc.txt)
          URL=$(cat /tmp/fb_url.txt)
          IMAGE="${{ steps.detect.outputs.image }}"

          # Use summary if available, otherwise fall back to description
          BODY="${SUMMARY:-$DESC}"

          # Build the message
          MESSAGE=$(printf '%s\n\n%s\n\nRead more: %s' "$TITLE" "$BODY" "$URL")

          if [ -n "$IMAGE" ]; then
            IMAGE_URL="https://dq.ms${IMAGE}"
            RESPONSE=$(curl -s -X POST \
              "https://graph.facebook.com/v21.0/${FB_PAGE_ID}/photos" \
              -F "url=${IMAGE_URL}" \
              -F "message=${MESSAGE}" \
              -F "access_token=${FB_ACCESS_TOKEN}")
          else
            RESPONSE=$(curl -s -X POST \
              "https://graph.facebook.com/v21.0/${FB_PAGE_ID}/feed" \
              -F "message=${MESSAGE}" \
              -F "access_token=${FB_ACCESS_TOKEN}")
          fi

          echo "Facebook API response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "::error::Facebook API returned an error"
            exit 1
          fi

          echo "Post published successfully!"
